<html lang="fi">
<head>

  <style>

</head>
<body>
  <div id="root"><div class="app-loading">Ladataan…</div></div>

  <script type="text/babel" data-presets="react">
const { useState, useMemo } = React;


/* --- Helsinki väripaletti --- */
const HEL = {
  vaakuna: "#0072C6", bussi: "#0000BF", tiili: "#BD2719", raitiovaunu: "#008741",
  kupari: "#00D7A7", metro: "#FD4F00", sumu: "#9FC9EB", kesa: "#FFC61E",
  engel: "#FFE977", suomenlinna: "#F5A3C7", hopea: "#DEDFE1", kulta: "#C2A251",
  valkoinen: "#FFFFFF", musta: "#000000",
};

/* ========== SHARED COMPONENTS ========== */

function FadeIn({ children }) {
  return <div style={{ animation: "fadeSlide 0.3s ease" }}>
    <style>{`@keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }`}</style>
    {children}
  </div>;
}
function Card({ children }) {
  return <div style={{ background: HEL.valkoinen, border: `1px solid ${HEL.hopea}`, borderRadius: 4, padding: "22px 24px", marginBottom: 16 }}>{children}</div>;
}
function CardLabel({ children }) {
  return <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: HEL.vaakuna, marginBottom: 8 }}>{children}</div>;
}
function OptionButton({ children, selected, onClick, accentColor = HEL.vaakuna }) {
  return (
    <button onClick={onClick} style={{
      display: "block", width: "100%", textAlign: "left",
      background: selected ? `${accentColor}0D` : "#fafafa",
      border: selected ? `2px solid ${accentColor}` : `1.5px solid ${HEL.hopea}`,
      borderRadius: 4, padding: "12px 16px", cursor: "pointer",
      fontFamily: "Arial, Helvetica, sans-serif", fontSize: 14,
      transition: "all 0.15s", boxSizing: "border-box",
    }}>{children}</button>
  );
}
function SectionTitle({ children }) {
  return <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: HEL.vaakuna, marginBottom: 12 }}>{children}</div>;
}

function CoefficientsInfo() {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ marginTop: 12 }}>
      <button onClick={() => setOpen(!open)} style={{
        background: "transparent", border: "none", cursor: "pointer", padding: 0,
        fontSize: 13, fontWeight: 700, color: HEL.vaakuna, fontFamily: "Arial, Helvetica, sans-serif",
        display: "flex", alignItems: "center", gap: 6,
      }}>
        <span style={{ transition: "transform 0.2s", transform: open ? "rotate(90deg)" : "rotate(0deg)", display: "inline-block" }}>▶</span>
        Tietoa kertoimista
      </button>
      {open && (
        <div style={{ marginTop: 10, padding: "14px 18px", background: "#f5f5f5", borderRadius: 4, border: `1px solid ${HEL.hopea}`, fontSize: 13, color: "#555", lineHeight: 1.65 }}>
          <p style={{ margin: "0 0 10px" }}>Markkinatilanteen ja riskitason kertoimet (×1,00 / ×1,15 / ×1,30) ovat karkeita oletusarvoja, eivät empiirisesti johdettuja vakioita. Ne on mitoitettu niin, että yksittäinen tekijä voi nostaa laatupainoa enimmillään 30 % ja molemmat yhdessä enimmillään noin 70 % suhteessa lähtötasoon. Esim. 10 %:n laatupreemiolla laskurin antaman suosituksen yläraja voi nousta korkeintaan 17 %:n tasolle.</p>
          <p style={{ margin: 0 }}>Jos organisaatiossasi on tarkempia näkemyksiä markkinatilanteen tai riskitason vaikutuksesta haluttuun hinta-laatupainotukseen, suosittelemme käyttämään tämän työkalun tulosta lähtökohtana ja säätämään lopullista painotusta oman harkinnan mukaan.</p>
        </div>
      )}
    </div>
  );
}

const labelStyle = { display: "block", fontSize: 12, fontWeight: 700, color: "#666", textTransform: "uppercase", letterSpacing: "0.06em" };
const textInputStyle = { width: "100%", padding: "12px 16px", fontSize: 15, fontFamily: "Arial, Helvetica, sans-serif", background: HEL.valkoinen, border: `2px solid ${HEL.hopea}`, borderRadius: 4, color: HEL.musta, outline: "none", boxSizing: "border-box" };
const numInputStyle = { width: "100%", padding: "14px 16px", fontSize: 20, fontFamily: "Arial, Helvetica, sans-serif", fontWeight: 700, background: "#fafafa", border: `2px solid ${HEL.hopea}`, borderRadius: 4, color: HEL.musta, outline: "none", boxSizing: "border-box", textAlign: "right" };
const inputStyleSmall = { background: "#fafafa", border: `1px solid ${HEL.hopea}`, borderRadius: 4, padding: "8px 12px", color: HEL.musta, fontSize: 13, fontFamily: "Arial, Helvetica, sans-serif", outline: "none", boxSizing: "border-box" };
const btnPrimary = { padding: "12px 28px", borderRadius: 4, border: `2px solid ${HEL.vaakuna}`, fontFamily: "Arial, Helvetica, sans-serif", fontSize: 14, fontWeight: 700, background: HEL.vaakuna, color: HEL.valkoinen, cursor: "pointer", transition: "all 0.2s" };
const btnSecondary = { padding: "12px 28px", borderRadius: 4, border: `2px solid ${HEL.hopea}`, fontFamily: "Arial, Helvetica, sans-serif", fontSize: 14, fontWeight: 700, background: "transparent", color: HEL.musta, cursor: "pointer", transition: "all 0.2s" };

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function formatEur(v) { return (!v && v !== 0) ? "" : Number(v).toLocaleString("fi-FI"); }


function HelpButton({ onClick }) {
  return (
    <button onClick={onClick} style={{
      width: 22, height: 22, borderRadius: "50%", border: `2px solid ${HEL.vaakuna}`,
      background: "transparent", color: HEL.vaakuna, fontSize: 12, fontWeight: 700,
      cursor: "pointer", display: "inline-flex", alignItems: "center", justifyContent: "center",
      fontFamily: "Arial, Helvetica, sans-serif", flexShrink: 0,
    }}>?</button>

}

const METHODS_INFO = [
  { id: "linear", name: "Suhteellinen kaava", formula: "Pisteet = (halvin / tarjous) × 100", note: "Halvin tarjous saa hinnasta täydet pisteet (100). Tuplahintainen saa 50.",
    desc: "Halvin tarjous saa 100 pistettä. Muut saavat pisteitä suhteessa halvimpaan tarjoukseen.",
    example: "Halvin 80 000 €, tarjoaja 100 000 € → 80 000 / 100 000 × 100 = 80,0 pistettä",
    kaytannossa: "Yleinen perusmenetelmä. Hinta vaikuttaa selvästi, mutta ei täysin lineaarisesti.",
    hyva: "Selkeä ja tuttu.",
    riski: "Poikkeuksellisen halpa tarjous voi painaa kaikkien muiden pisteitä paljon alas." },
  { id: "relative", name: "Hintaero-kaava", formula: "Pisteet = 100 − ((tarjous − halvin) / halvin × 100)", note: "Halvin tarjous saa hinnasta täydet pisteet (100). Jokainen prosenttiyksikkö hintaeroa vähentää yhden pisteen.",
    desc: "Halvin tarjous saa 100 pistettä. Jokainen prosentuaalinen hintaero halvimpaan vähentää pisteitä suoraan.",
    example: "Halvin 80 000 €, tarjoaja 100 000 € → 100 − 25 = 75,0 pistettä",
    kaytannossa: "Hintaerot näkyvät pisteissä voimakkaasti ja helposti ymmärrettävästi.",
    hyva: "Erittäin helppo selittää — jokainen lisäprosentti vähentää pisteitä.",
    riski: "Voi tehdä vertailusta hyvin hintapainotteisen. Jos tarjous on yli 100 % halvinta kalliimpi, pisteet menevät negatiivisiksi, ellei niitä rajata nollaan." },
  { id: "interpolation", name: "Lineaarinen interpolointi", formula: "Pisteet = (kallein − tarjous) / (kallein − halvin) × 100", note: "Halvin tarjous saa hinnasta täydet pisteet (100), kallein nolla. Muut sijoittuvat tälle välille tasaisesti.",
    desc: "Halvin tarjous saa 100 pistettä ja kallein 0 pistettä. Muut sijoittuvat tasaisesti niiden väliin.",
    example: "Halvin 80 000 €, kallein 110 000 €, tarjoaja 100 000 € → (110 000 − 100 000) / (110 000 − 80 000) × 100 = 33,3 pistettä",
    kaytannossa: "Pisteet riippuvat koko tarjousjoukon hintahaarukasta, eivät vain halvimmasta tarjouksesta.",
    hyva: "Yksi halpa tarjous ei yksin määrää muiden pisteitä.",
    riski: "Yksi hyvin kallis tarjous voi venyttää asteikkoa ja nostaa muiden pisteitä keinotekoisesti." },
  { id: "budget", name: "Budjettisidonnainen kaava", formula: "Pisteet = (budjetti − tarjous) / budjetti × 100", note: "Vertailukohtana on ennalta asetettu budjetti tai hintakatto, ei halvin tarjous.",
    desc: "Vertailukohtana on ennalta asetettu budjetti tai hintakatto, ei halvin tarjous.",
    example: "Budjetti 120 000 €, tarjoaja 100 000 € → (120 000 − 100 000) / 120 000 × 100 = 16,7 pistettä",
    kaytannossa: "Pisteytys ei muutu muiden tarjousten mukana, joten tarjoajat voivat arvioida omia pisteitään etukäteen.",
    hyva: "Vakaa ja ennustettava.",
    riski: "Jos budjetti on asetettu liian korkeaksi tai matalaksi, hintapisteet voivat ohjata vertailua väärällä tavalla." },

function PriceMethodHelp({ onClose }) {

    <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 1000, display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "40px 20px", overflowY: "auto" }}>
      <div style={{ background: HEL.valkoinen, borderRadius: 4, maxWidth: 720, width: "100%", maxHeight: "calc(100vh - 80px)", overflowY: "auto", position: "relative" }}>

          <div>
            <div style={{ fontSize: 18, fontWeight: 700 }}>Hintapisteiden laskentamenetelmät</div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", marginTop: 2 }}>Neljä yleisintä tapaa pisteyttää hinta tarjousvertailussa</div>
          </div>
          <button onClick={onClose} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: HEL.valkoinen, width: 32, height: 32, borderRadius: 4, cursor: "pointer", fontSize: 18, fontWeight: 700 }}>✕</button>
        </div>
        <div style={{ padding: "24px" }}>
          <p style={{ fontSize: 14, lineHeight: 1.65, color: "#333", marginBottom: 24 }}>
            Hintapisteiden laskentamenetelmä määrittää, miten hintaerot näkyvät tarjoajien kokonaispisteissä. Menetelmän valinta voi vaikuttaa siihen, kuka voittaa vertailun.
          </p>
          {METHODS_INFO.map((m, i) => (
            <div key={m.id} style={{ border: `1px solid ${HEL.hopea}`, borderRadius: 4, marginBottom: 16, overflow: "hidden" }}>
              <div style={{ background: "#f0f7ff", padding: "12px 18px", display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ width: 24, height: 24, borderRadius: "50%", background: HEL.vaakuna, color: HEL.valkoinen, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{i + 1}</span>
                <span style={{ fontSize: 15, fontWeight: 700 }}>{m.name}</span>
              </div>
              <div style={{ padding: "14px 18px" }}>
                <div style={{ background: "#f5f5f5", border: `1px solid ${HEL.hopea}`, borderRadius: 4, padding: "10px 14px", marginBottom: 12 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: HEL.vaakuna }}>{m.formula}</div>
                  <div style={{ fontSize: 11, color: "#888", marginTop: 4 }}>{m.note}</div>
                </div>
                <p style={{ fontSize: 13, lineHeight: 1.6, color: "#333", marginBottom: 8 }}>{m.desc}</p>
                <p style={{ fontSize: 12, color: "#555", marginBottom: 12 }}><strong>Esimerkki:</strong> {m.example}</p>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  <div style={{ display: "flex", gap: 8, alignItems: "baseline" }}>
                    <span style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: "#888", flexShrink: 0, width: 90 }}>Käytännössä</span>
                    <span style={{ fontSize: 13, color: "#333", lineHeight: 1.5 }}>{m.kaytannossa}</span>
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "baseline" }}>
                    <span style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: HEL.raitiovaunu, flexShrink: 0, width: 90 }}>Hyvä puoli</span>
                    <span style={{ fontSize: 13, color: "#333", lineHeight: 1.5 }}>{m.hyva}</span>
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "baseline" }}>
                    <span style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", color: HEL.metro, flexShrink: 0, width: 90 }}>Riski</span>
                    <span style={{ fontSize: 13, color: "#333", lineHeight: 1.5 }}>{m.riski}</span>
                  </div>
                </div>
              </div>
            </div>
          ))}

          {/* Summary table */}
          <div style={{ fontSize: 16, fontWeight: 700, marginTop: 24, marginBottom: 12 }}>Yhteenveto</div>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead>
              <tr>{["Menetelmä", "Mihin pisteet perustuvat?", "Mitä tämä tarkoittaa käytännössä?"].map(h => (
                <th key={h} style={{ background: HEL.vaakuna, color: HEL.valkoinen, padding: "8px 10px", textAlign: "left", fontWeight: 700 }}>{h}</th>
              ))}</tr>
            </thead>
            <tbody>
              {[
                ["Suhteellinen", "Halvimpaan tarjoukseen", "Hyvä yleisvalinta"],
                ["Hintaero", "Eroon halvimpaan tarjoukseen", "Korostaa hintaeroja eniten"],
                ["Interpolointi", "Halvimman ja kalleimman väliin", "Huomioi koko tarjousjoukon hintahaarukan"],
                ["Budjettisidonnainen", "Ennalta asetettuun budjettiin", "Vakain ja ennustettavin"],
              ].map(([name, ref, practical], i) => (
                <tr key={i}>
                  <td style={{ padding: "8px 10px", borderBottom: `1px solid ${HEL.hopea}`, fontWeight: 700 }}>{name}</td>
                  <td style={{ padding: "8px 10px", borderBottom: `1px solid ${HEL.hopea}` }}>{ref}</td>
                  <td style={{ padding: "8px 10px", borderBottom: `1px solid ${HEL.hopea}` }}>{practical}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ========== MAIN APP ========== */

function App() {
  const [mode, setMode] = useState(null); // null = landing, "wizard" | "comparison"
  const [passedQualityWeight, setPassedQualityWeight] = useState(null);
  const [passedPriceMethod, setPassedPriceMethod] = useState(null);
  const [passedProcName, setPassedProcName] = useState("");

  const goToComparison = (qualityWeight, priceMethod, procName = "") => {
    setPassedQualityWeight(qualityWeight);
    setPassedPriceMethod(priceMethod);
    setPassedProcName(procName);
    setMode("comparison");
  };

  return (
    <div style={{ fontFamily: "Arial, Helvetica, sans-serif", background: HEL.valkoinen, color: HEL.musta, minHeight: "100vh" }}>
      {/* Header */}
      <div style={{ background: HEL.vaakuna, color: HEL.valkoinen, padding: "20px 32px 16px" }}>
        <div style={{ maxWidth: 780, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 20, fontWeight: 700 }}>Tarjousvertailun laskentatyökalut</h1>
          </div>
          {mode !== null && (
            <button onClick={() => setMode(null)} style={{ ...btnSecondary, border: "2px solid rgba(255,255,255,0.3)", color: HEL.valkoinen, padding: "8px 16px", fontSize: 12 }}>
              ← Alkuun
            </button>
          )}
        </div>
      </div>

      {/* Tool selector tabs when in a tool */}
      {mode !== null && (
        <div style={{ background: "#f5f5f5", borderBottom: `2px solid ${HEL.hopea}` }}>
          <div style={{ maxWidth: 780, margin: "0 auto", display: "flex" }}>
            {[
              { id: "wizard", label: "Painotuslaskuri" },
              { id: "comparison", label: "Vertailulaskuri" },
            ].map((t) => (
              <button key={t.id} onClick={() => setMode(t.id)} style={{
                flex: 1, padding: "12px 8px", border: "none", cursor: "pointer",
                background: mode === t.id ? HEL.valkoinen : "transparent",
                borderBottom: mode === t.id ? `3px solid ${HEL.vaakuna}` : "3px solid transparent",
                fontFamily: "Arial, Helvetica, sans-serif", fontSize: 13, fontWeight: 700,
                color: mode === t.id ? HEL.vaakuna : "#888", transition: "all 0.2s",
              }}>{t.label}</button>
            ))}
          </div>
        </div>
      )}

      {/* Landing page */}
      {mode === null && <LandingPage onSelect={setMode} />}

      {/* Tools — wizard stays mounted to preserve state */}
      {(mode === "wizard" || mode === "comparison") && (
        <div style={{ display: mode === "wizard" ? "block" : "none" }}>
          <WeightingWizard onGoToComparison={goToComparison} />
        </div>
      )}
      {mode === "comparison" && <ComparisonCalculator initialQualityWeight={passedQualityWeight} initialPriceMethod={passedPriceMethod} initialProcName={passedProcName} />}
    </div>
  );
}

/* ========== LANDING PAGE ========== */

    <div style={{ maxWidth: 780, margin: "0 auto", padding: "48px 28px" }}>
      <FadeIn>

          <button onClick={() => onSelect("wizard")} style={{
            background: HEL.valkoinen, border: `2px solid ${HEL.hopea}`, borderRadius: 4, padding: "28px 24px",
            cursor: "pointer", textAlign: "left", fontFamily: "Arial, Helvetica, sans-serif", transition: "all 0.2s",
          }}>
            <div style={{ fontSize: 28, marginBottom: 12 }}>⚖️</div>

            <div style={{ fontSize: 13, color: "#666", lineHeight: 1.5 }}>

          <button onClick={() => onSelect("comparison")} style={{
            background: HEL.valkoinen, border: `2px solid ${HEL.hopea}`, borderRadius: 4, padding: "28px 24px",

            <div style={{ fontSize: 28, marginBottom: 12 }}>📊</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: HEL.musta, marginBottom: 6 }}>Vertailulaskuri</div>
            <div style={{ fontSize: 13, color: "#666", lineHeight: 1.5 }}>

            <div style={{ marginTop: 16, fontSize: 12, fontWeight: 700, color: HEL.vaakuna }}>Aloita →</div>
          </button>
        </div>
      </FadeIn>
    </div>
  );
}

/* ========== WEIGHTING WIZARD ========== */

const WIZARD_STEPS = [
  { id: "intro", label: "Aloitus" },
  { id: "premium", label: "Laatupreemio" },
  { id: "market", label: "Markkinat" },
  { id: "risk", label: "Riskit" },
  { id: "result", label: "Suositus" },
];

const RISK_OPTIONS = [
  { value: 1, label: "Matala", desc: "Seuraukset hallittavia, toimittaja vaihdettavissa tarvittaessa ilman suurta vaivaa", color: HEL.raitiovaunu },
  { value: 2, label: "Kohtalainen", desc: "Häiriöitä tai lisäkustannuksia. Toimittajan vaihtaminen vaatii aikaa ja työtä.", color: HEL.kesa },
  { value: 3, label: "Korkea", desc: "Vakavia seurauksia toiminnalle, taloudelle tai turvallisuudelle — sopimuksesta vaikea irrottautua tai vaihto hyvin kallis", color: HEL.tiili },
];

const VARIATION_OPTIONS = [
  { value: 1, label: "Vähäinen", desc: "Laatua on vaikea mitata tai pisteyttää. Kriteerit eivät todennäköisesti tuota merkittäviä pisteeroja tarjoajien välille." },
  { value: 2, label: "Kohtalainen", desc: "Laatueroja voidaan arvioida, mutta pisteytys vaatii tulkintaa. Osa eroista jää väistämättä kriteerien ulkopuolelle." },
  { value: 3, label: "Suuri", desc: "Laatu on hyvin mitattavissa. Käytettävissä olevat kriteerit tuottavat selkeitä ja perusteltavissa olevia pisteeroja." },

function WeightingWizard({ onGoToComparison }) {
  const [step, setStep] = useState(0);
  const [procName, setProcName] = useState("");
  const [priceMethod, setPriceMethod] = useState("linear");
  const [showHelp, setShowHelp] = useState(false);
  const [minPrice, setMinPrice] = useState("");
  const [maxPrice, setMaxPrice] = useState("");
  const [riskSeverity, setRiskSeverity] = useState(null);
  const [qualityVariation, setQualityVariation] = useState(null);

  const minVal = Number(String(minPrice).replace(/\s/g, "")) || 0;
  const maxVal = Number(String(maxPrice).replace(/\s/g, "")) || 0;
  const premiumPct = minVal > 0 ? ((maxVal - minVal) / minVal) * 100 : 0;

  const recommendation = useMemo(() => {
    const premium = premiumPct / 100;
    // Formula depends on price scoring method:
    // Suhteellinen (linear): Q = 100 × p / (1 + 2p)
    // Hintaero (relative):   Q = 100 × p / (1 + p)
    let premiumBase = 0;
    let formulaName = "";
    let formulaText = "";
    if (premium > 0) {

    return { premiumBase, rangeLow, rangeHigh, afterMarket, isRange, marketMultiplier, marketLabel, marketExplain, riskMultiplier, riskLabel, riskExplain, formulaName, formulaText };

/* ========== COMPARISON CALCULATOR ========== */

const QUALITY_CRITERIA_DEFAULTS = [
  { name: "Kokemus ja referenssit", maxScore: 10 },
  { name: "Toteutussuunnitelma", maxScore: 10 },
  { name: "Avainhenkilöiden osaaminen", maxScore: 10 },
];

function calcPriceScore(price, lowestPrice, method, extra = {}) {
  if (price <= 0) return 0;
  if (method === "linear") return (lowestPrice / price) * 100;
  if (method === "relative") { const diff = ((price - lowestPrice) / lowestPrice) * 100; return Math.max(0, 100 - diff); }
  if (method === "interpolation") {
    const highest = extra.highestPrice || price;
    if (highest === lowestPrice) return 100;
    return ((highest - price) / (highest - lowestPrice)) * 100;
  }
  if (method === "budget") {
    const budget = extra.budget || 0;
    if (budget <= 0) return 0;
    return ((budget - price) / budget) * 100;
  }
  return (lowestPrice / price) * 100;
}

function ComparisonCalculator({ initialQualityWeight, initialPriceMethod, initialProcName }) {
  const [priceWeight, setPriceWeight] = useState(initialQualityWeight ? 100 - initialQualityWeight : 60);
  const qualityWeight = 100 - priceWeight;
  const [priceMethod, setPriceMethod] = useState(initialPriceMethod || "linear");
  const [procName, setProcName] = useState(initialProcName || "");
  const [budget, setBudget] = useState("");
  const [showHelp, setShowHelp] = useState(false);
  const [qualityCriteria, setQualityCriteria] = useState(QUALITY_CRITERIA_DEFAULTS);
  const [suppliers, setSuppliers] = useState([
    { name: "Toimittaja A", price: 100000, qualityScores: [8, 7, 9] },
    { name: "Toimittaja B", price: 85000, qualityScores: [6, 5, 6] },
    { name: "Toimittaja C", price: 110000, qualityScores: [9, 9, 10] },
  ]);
  const [activeStep, setActiveStep] = useState(0);

  const maxQualityTotal = qualityCriteria.reduce((s, c) => s + c.maxScore, 0);
  const lowestPrice = Math.min(...suppliers.map((s) => s.price).filter((p) => p > 0));
  const highestPrice = Math.max(...suppliers.map((s) => s.price).filter((p) => p > 0));
  const budgetVal = Number(String(budget).replace(/\s/g, "")) || 0;

  const results = useMemo(() => {
    const extra = { highestPrice, budget: budgetVal };
    return suppliers.map((s) => {
      const qualityTotal = s.qualityScores.reduce((sum, sc) => sum + sc, 0);
      const qualityPct = maxQualityTotal > 0 ? (qualityTotal / maxQualityTotal) * 100 : 0;
      const priceScore = calcPriceScore(s.price, lowestPrice, priceMethod, extra);
      const weightedPrice = (priceScore * priceWeight) / 100;
      const weightedQuality = (qualityPct * qualityWeight) / 100;
      const total = weightedPrice + weightedQuality;
      return { ...s, qualityTotal, qualityPct, priceScore, weightedPrice, weightedQuality, total };
    }).sort((a, b) => b.total - a.total);
  }, [suppliers, priceWeight, qualityWeight, priceMethod, lowestPrice, highestPrice, budgetVal, maxQualityTotal]);

  const addSupplier = () => setSuppliers([...suppliers, { name: `Toimittaja ${String.fromCharCode(65 + suppliers.length)}`, price: 0, qualityScores: qualityCriteria.map(() => 0) }]);
  const removeSupplier = (i) => { if (suppliers.length <= 2) return; setSuppliers(suppliers.filter((_, idx) => idx !== i)); };
  const updateSupplier = (i, field, value) => { const u = [...suppliers]; u[i] = { ...u[i], [field]: value }; setSuppliers(u); };
  const updateScore = (si, ci, value) => { const u = [...suppliers]; const sc = [...u[si].qualityScores]; sc[ci] = Math.min(Math.max(0, Number(value) || 0), qualityCriteria[ci].maxScore); u[si] = { ...u[si], qualityScores: sc }; setSuppliers(u); };
  const addCriterion = () => { setQualityCriteria([...qualityCriteria, { name: "Uusi kriteeri", maxScore: 10 }]); setSuppliers(suppliers.map((s) => ({ ...s, qualityScores: [...s.qualityScores, 0] }))); };
  const removeCriterion = (i) => { if (qualityCriteria.length <= 1) return; setQualityCriteria(qualityCriteria.filter((_, idx) => idx !== i)); setSuppliers(suppliers.map((s) => ({ ...s, qualityScores: s.qualityScores.filter((_, idx) => idx !== i) }))); };
  const updateCriterion = (i, field, value) => {
    const u = [...qualityCriteria];
    u[i] = { ...u[i], [field]: value };
    setQualityCriteria(u);
    if (field === "maxScore") {
      const newMax = Number(value) || 1;
      setSuppliers(prev => prev.map(s => {
        const sc = [...s.qualityScores];
        if (sc[i] > newMax) sc[i] = newMax;
        return { ...s, qualityScores: sc };
      }));
    }
  };

  const winner = results[0];
  const maxTotal = winner?.total || 1;

  const compSteps = [
    { id: "setup", label: "Painotukset" },
    { id: "criteria", label: "Kriteerit" },
    { id: "evaluate", label: "Arviointi" },
    { id: "results", label: "Tulokset" },

              color: i === activeStep ? HEL.vaakuna : i < activeStep ? "#555" : "#aaa", transition: "all 0.2s",
            }}>
              <span style={{
                display: "inline-flex", width: 18, height: 18, borderRadius: "50%", alignItems: "center", justifyContent: "center",

                background: i < activeStep ? HEL.vaakuna : i === activeStep ? HEL.vaakuna : HEL.hopea,

        </div>

            <Card>

            </Card>

            <button onClick={addCriterion} style={{ background: `${HEL.vaakuna}10`, border: `1.5px dashed ${HEL.vaakuna}40`, color: HEL.vaakuna, borderRadius: 4, padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 700, width: "100%", marginTop: 8, fontFamily: "Arial, Helvetica, sans-serif" }}>+ Lisää kriteeri</button>

              );
            })}

            <div style={{ marginTop: 24, background: `${HEL.vaakuna}08`, border: `1px solid ${HEL.vaakuna}20`, borderRadius: 4, padding: "16px 20px" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: HEL.vaakuna, marginBottom: 6 }}>💡 Herkkyysanalyysi-vinkki</div>
              <div style={{ fontSize: 12, color: "#666", lineHeight: 1.6 }}>Kokeile muuttaa painotusta tai laskentamenetelmää ensimmäisellä sivulla. Jos pienikin muutos vaihtaa voittajaa, vertailu on herkkä ja kriteereitä kannattaa tarkentaa.</div>
            </div>
          </FadeIn>
        )}

        {/* Navigation */}
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 28, paddingTop: 20, borderTop: `1px solid ${HEL.hopea}` }}>
          <button onClick={() => compNav(-1)} disabled={activeStep === 0} style={{ ...btnSecondary, opacity: activeStep === 0 ? 0.3 : 1, cursor: activeStep === 0 ? "default" : "pointer" }}>← Edellinen</button>
          {activeStep < compSteps.length - 1 && (
            <button onClick={() => compNav(1)} style={btnPrimary}>
              {activeStep === compSteps.length - 2 ? "Näytä tulokset →" : "Seuraava →"}
            </button>
          )}
        </div>
      </div>

      {/* Footer */}
      <div style={{ textAlign: "center", marginTop: 32, paddingTop: 16, borderTop: `1px solid ${HEL.hopea}`, color: "#aaa", fontSize: 11, fontFamily: "Arial, Helvetica, sans-serif", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
        <span>© {new Date().getFullYear()} Ilkka Paukkunen</span>
        <a href="https://www.linkedin.com/in/ilkka-paukkunen/" target="_blank" rel="noopener noreferrer" title="LinkedIn" style={{ display: "inline-flex", alignItems: "center", color: "#aaa", textDecoration: "none", transition: "color 0.15s" }}
          onMouseEnter={e => e.currentTarget.style.color = "#0A66C2"}
          onMouseLeave={e => e.currentTarget.style.color = "#aaa"}>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </a>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
